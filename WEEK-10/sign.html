<!DOCTYPE html>
<html>
    <body>
        <script>
            function sign(a,b,c){
                if((a*b*c)>0){
                    window.alert("The sign of product  is +");
                }
                else if((a*b*c)<0){
                    window.alert("The sign of product of  is -");
                }
                else{
                    window.alert("The product is zero(no sign)");
                }

            }
            sign(0,-5,-8);
        </script>
    </body>
</html>
