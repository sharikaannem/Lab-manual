<!DOCTYPE html>
<html>
    <head>
        <Style>

            body{
                background-image:url(download\ \(5\).jpg);
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
                height:100vh;
                margin:0;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
            }
            #output{
                text-align: center;
                background-color: rgba(255, 255, 255, 0.7);
                padding: 20px 40px;
                border-radius: 10px;
                font-size: 18px;
                color: darkviolet;
            }
            h1{
                text-align:center;
                color:brown;
            }

            
        </Style>
    </head>
    <body>
        <h1>Checking Even and Odd numbers from  0 to 15</h1>
        <div id="output"></div>
        <script>
            let number="";
            for(let i=0;i<=15;i++){
                if(i%2==0){
                    number+="The number " + i +" is even  <br>";
                }
                else{
                    number+="The number " + i +" is odd  <br>";
                }
            }
            document.getElementById("output").innerHTML=number;
        </script>
    </body>
</html>
