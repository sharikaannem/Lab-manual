<!DOCTYPE html>
<html>
    <body>
          <h1 style="text-align:center;">User Registration</h1>
        <form>
                <table border="3" cellpadding="5" style="text-align: center; border:3px solid;margin:auto">
                    <tr>
                        <th>
                            <label for="fname">Full Name:</label>
                            <td> <input type="text" id="fname" name="fname"><br></td>
                        </th>
                    </tr>
                    <tr>
                        <th>
                            <label for="email">Email:</label>
                            <td><input type="text" id="email" name="email"><br></td>
                        </th>
                    </tr>
                    <tr>
                        <th>
                            <label for="phone">Phone</label>
                            <td><input type="number" id="phone" name="phone"><br></td>
                        </th>
                    </tr>
                    <tr>
                        <th>
                            <label for="password">Password</label>
                            <td><input type="password" id="password" name="password"><br></td>
                        </th>
                    </tr>
                    <tr>
                        <th colspan="2">
                            <input type="submit" value="Register">
                            <input type="reset" value="Reset">
                        </th>
                    </tr>
                </table>
            
        </form>
    </body>
</html>
